name: CI Paper

on:
  push:
    branches: [main]
    paths: ['paper/**']
  pull_request:
    branches: [main]
    paths: ['paper/**']

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: texlive/texlive:latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install poppler-utils
        run: |
          apt-get update
          apt-get install -y --no-install-recommends poppler-utils

      - name: Build PDFs
        run: bash paper/xpower-banq-all.sh

      - name: Upload PDFs
        uses: actions/upload-artifact@v4
        with:
          name: xpower-banq-pdfs
          path: |
            paper/xpower-banq-all.pdf
            paper/xpower-banq-apx.pdf
            paper/xpower-banq.pdf
