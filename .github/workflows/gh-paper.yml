name: GH Paper

on:
  push:
    tags: ['v*'] # triggers workflow on pushing a tag

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: texlive/texlive:latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build PDFs
        run: bash paper/000.banq-all/banq-all.sh

      - name: Upload PDFs
        uses: actions/upload-artifact@v4
        with:
          name: banq-pdfs
          path: |
            paper/000.banq-all/banq-all.pdf
            paper/001.banq-pro/banq-pro.pdf
            paper/002.banq-lck/banq-lck.pdf
            paper/003.banq-log/banq-log.pdf
            paper/004.banq-mtp/banq-mtp.pdf
            paper/005.banq-sim/banq-sim.pdf
            paper/006.banq-ref/banq-ref.pdf

  release:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download PDFs
        uses: actions/download-artifact@v4
        with:
          name: banq-pdfs
          path: ./dist

      - name: List PDFs
        run: ls -R ./dist

      - name: IPFS PDFs (pin and get CIDs)
        env:
          IPFS_API_TOKEN: ${{ secrets.IPFS_API_TOKEN }}
        run: |
          for pdf in $(find ./dist -name '*.pdf' | sort); do
            RESP=$(curl -s -w "\n%{http_code}" -X POST \
              -H "Authorization: Bearer ${IPFS_API_TOKEN}" \
              -F "file=@${pdf}" "https://ipfs.xpowerbanq.com/api/v0/add")
            CODE=$(echo "$RESP" | tail -1)
            BODY=$(echo "$RESP" | sed '$d')
            echo "Response for $(basename $pdf) [HTTP $CODE]: $BODY"
            HASH=$(echo "$BODY" | jq -r '.Hash')
            echo "Pinned $(basename $pdf): $HASH"
            NAME=$(basename $pdf .pdf | tr '-' '_')
            echo "${NAME}=$HASH" >> "$GITHUB_ENV"
          done

      - name: IPFS links (append to RELEASE.md)
        run: |
          short() { echo "${1:0:8}…${1: -4}"; }
          cat >> ./paper/RELEASE.md << EOF

          ## 🌐 IPFS

          | PDF | Link |
          | --- | ---- |
          | \`banq-all.pdf\` | [\`https://ipfs.io/ipfs/$(short ${banq_all})\`](https://ipfs.io/ipfs/${banq_all}) |
          | \`banq-pro.pdf\` | [\`https://ipfs.io/ipfs/$(short ${banq_pro})\`](https://ipfs.io/ipfs/${banq_pro}) |
          | \`banq-lck.pdf\` | [\`https://ipfs.io/ipfs/$(short ${banq_lck})\`](https://ipfs.io/ipfs/${banq_lck}) |
          | \`banq-log.pdf\` | [\`https://ipfs.io/ipfs/$(short ${banq_log})\`](https://ipfs.io/ipfs/${banq_log}) |
          | \`banq-mtp.pdf\` | [\`https://ipfs.io/ipfs/$(short ${banq_mtp})\`](https://ipfs.io/ipfs/${banq_mtp}) |
          | \`banq-sim.pdf\` | [\`https://ipfs.io/ipfs/$(short ${banq_sim})\`](https://ipfs.io/ipfs/${banq_sim}) |
          | \`banq-ref.pdf\` | [\`https://ipfs.io/ipfs/$(short ${banq_ref})\`](https://ipfs.io/ipfs/${banq_ref}) |

          ## ⚖️ Copyright

          © 2025 [Moorhead LLC](#)
          EOF

      - name: Delete GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete ${{ github.ref_name }} --yes || true

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ github.ref_name }} \
            -t "XPower Banq Paper ${{ github.ref_name }}" \
            -F ./paper/RELEASE.md \
            ./dist/000.banq-all/banq-all.pdf \
            ./dist/001.banq-pro/banq-pro.pdf \
            ./dist/002.banq-lck/banq-lck.pdf \
            ./dist/003.banq-log/banq-log.pdf \
            ./dist/004.banq-mtp/banq-mtp.pdf \
            ./dist/005.banq-sim/banq-sim.pdf \
            ./dist/006.banq-ref/banq-ref.pdf
